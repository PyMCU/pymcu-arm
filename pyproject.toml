[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[project]
name = "pymcu-rp2040"
version = "0.1.0a1"
description = "RP2040 (Cortex-M0+) support for pymcu-compiler: LLVM-IR codegen backend + LLVM toolchain driver"
readme = "README.md"
authors = [
    { name = "Iván Montiel Cardona", email = "developer@begeistert.dev" }
]
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "pymcu-backend-sdk>=0.1.0a1",
    "pymcu-toolchain-sdk>=0.1.0a1",
    # NOTE: the vendored LLVM toolchain wheel (pymcu-rp2040-toolchain, bundling
    # opt/llc/llvm-mc/ld.lld/llvm-objcopy) is not published yet. Until it is, the
    # Rp2040LlvmToolchain resolves LLVM from ~/.pymcu/tools, common keg dirs, or
    # PATH (e.g. `brew install llvm lld`). When the wheel ships, re-add it here
    # with a platform marker so `pip install pymcu[rp2040]` is self-contained.
]

[project.entry-points."pymcu.backends"]
rp2040 = "pymcu.backend.rp2040:Rp2040BackendPlugin"

[project.entry-points."pymcu.toolchains"]
rp2040 = "pymcu.toolchain.rp2040:Rp2040ToolchainPlugin"

[tool.uv.sources]
pymcu-backend-sdk = {path = "../pymcu-backend-sdk", editable = true}
pymcu-toolchain-sdk = {path = "../pymcu-toolchain-sdk", editable = true}

[tool.hatch.build.hooks.custom]
path = "hatch_build.py"

[tool.hatch.build.targets.wheel]
packages = ["src/python/pymcu"]
artifacts = ["src/python/pymcu/backend/rp2040/pymcuc-rp2040*"]
